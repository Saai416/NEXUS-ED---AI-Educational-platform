<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Courses</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        },
                        dark: {
                            bg: '#0f1117',
                            card: '#181b25',
                            border: '#2a2f3e'
                        }
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(37, 99, 235, 0.3)',
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f1117;
            color: white;
            /* Fallback for Tailwind */
            overflow-x: hidden;
            padding-bottom: 80px;
            /* Space for bottom nav */
        }

        .glass-header {
            background: rgba(15, 17, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .course-card {
            background: #181b25;
            border: 1px solid #2a2f3e;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .course-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(59, 130, 246, 0.2);
        }

        .bottom-nav {
            background: rgba(24, 27, 37, 0.85);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Hide Scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="text-white antialiased">

    <!-- Sticky Header -->
    <div class="glass-header sticky top-0 z-20 w-full">
        <div class="max-w-md mx-auto px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="size-10 rounded-full bg-gradient-to-tr from-primary-600 to-indigo-600 p-[2px]">
                    <div class="rounded-full bg-dark-bg w-full h-full flex items-center justify-center">
                        <span class="material-symbols-rounded text-primary-400">school</span>
                    </div>
                </div>
                <h1 class="text-lg font-bold">My Courses</h1>
            </div>

            <button
                class="size-10 rounded-xl bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors relative">
                <span class="material-symbols-rounded text-slate-300">notifications</span>
                <span class="absolute top-2.5 right-3 size-2 bg-red-500 rounded-full border-2 border-dark-card"></span>
            </button>
        </div>

        <!-- Search -->
        <div class="max-w-md mx-auto px-5 pb-4">
            <div class="relative group">
                <span
                    class="material-symbols-rounded absolute left-4 top-3.5 text-slate-500 group-focus-within:text-primary-400 transition-colors">search</span>
                <input type="text" placeholder="Search for courses..."
                    class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-sm text-white placeholder:text-slate-600 focus:ring-0 focus:border-primary-500/50 transition-all">
            </div>
        </div>

        <!-- Filters -->
        <div class="max-w-md mx-auto px-5 pb-4 flex gap-3 overflow-x-auto no-scrollbar">
            <button
                class="px-4 py-1.5 rounded-full bg-primary-600 text-white text-xs font-semibold whitespace-nowrap shadow-glow">All
                Subjects</button>
            <button
                class="px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-slate-300 hover:text-white hover:bg-white/10 text-xs font-medium whitespace-nowrap transition-colors">Science</button>
            <button
                class="px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-slate-300 hover:text-white hover:bg-white/10 text-xs font-medium whitespace-nowrap transition-colors">Mathematics</button>
            <button
                class="px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-slate-300 hover:text-white hover:bg-white/10 text-xs font-medium whitespace-nowrap transition-colors">History</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-md mx-auto px-5 pt-6 pb-8 space-y-6">

        <!-- Active Course -->
        <div onclick="window.location.href='../student_ai_chat_dashboard/code.html?course=Advanced%20Organic%20Chemistry'"
            class="course-card rounded-2xl overflow-hidden cursor-pointer group relative">
            <!-- Image/Gradient Area -->
            <div
                class="h-32 bg-gradient-to-r from-blue-900 via-primary-900 to-slate-900 relative p-5 flex flex-col justify-between">
                <div
                    class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-20">
                </div>
                <div class="flex justify-between items-start z-10 w-full text-white">
                    <span
                        class="bg-white/10 backdrop-blur-md text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider">In
                        Progress</span>
                </div>
                <div class="z-10">
                    <h3 class="text-xl font-bold leading-tight mb-1">Advanced Organic Chemistry</h3>
                    <p class="text-xs text-blue-200">Dr. Sarah Jenkins</p>
                </div>
            </div>

            <!-- Progress Section -->
            <div class="p-4 bg-dark-card element-bg">
                <div class="flex justify-between items-end mb-2">
                    <div class="flex flex-col">
                        <span class="text-xs text-slate-400 font-medium">Progress</span>
                        <span class="text-lg font-bold text-primary-400">45%</span>
                    </div>
                    <button
                        class="size-10 rounded-full bg-primary-600 hover:bg-primary-500 text-white flex items-center justify-center shadow-lg transition-transform group-hover:scale-110">
                        <span class="material-symbols-rounded">play_arrow</span>
                    </button>
                </div>
                <div class="w-full bg-white/5 rounded-full h-1.5 overflow-hidden">
                    <div class="bg-gradient-to-r from-primary-600 to-indigo-500 h-full rounded-full" style="width: 45%">
                    </div>
                </div>
            </div>
        </div>

        <!-- Course List -->
        <div class="space-y-4">
            <h2 class="text-sm font-bold text-slate-300 uppercase tracking-wider ml-1">New Courses</h2>

            <!-- Card 1 -->
            <div onclick="window.location.href='../student_ai_chat_dashboard/code.html?course=Modern%20World%20History'"
                class="course-card rounded-2xl p-4 flex gap-4 cursor-pointer group">
                <div
                    class="size-20 rounded-xl bg-orange-900/30 flex items-center justify-center shrink-0 border border-orange-500/20 text-orange-400">
                    <span class="material-symbols-rounded text-3xl">public</span>
                </div>
                <div class="flex flex-col justify-center flex-1 min-w-0">
                    <h3 class="font-bold text-white truncate group-hover:text-primary-400 transition-colors">Modern
                        World History</h3>
                    <p class="text-xs text-slate-400 mb-2">Prof. Marcus Aurelius</p>
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] bg-white/5 px-2 py-0.5 rounded text-slate-300">8 Topics</span>
                        <span class="text-[10px] text-green-400 flex items-center gap-1">
                            <span class="size-1.5 rounded-full bg-green-500"></span>
                            New Content
                        </span>
                    </div>
                </div>
                <div class="flex items-center justify-center text-slate-600 group-hover:text-white transition-colors">
                    <span class="material-symbols-rounded">chevron_right</span>
                </div>
            </div>

            <!-- Card 2 -->
            <div onclick="window.location.href='../student_ai_chat_dashboard/code.html?course=Discrete%20Mathematics'"
                class="course-card rounded-2xl p-4 flex gap-4 cursor-pointer group">
                <div
                    class="size-20 rounded-xl bg-purple-900/30 flex items-center justify-center shrink-0 border border-purple-500/20 text-purple-400">
                    <span class="material-symbols-rounded text-3xl">functions</span>
                </div>
                <div class="flex flex-col justify-center flex-1 min-w-0">
                    <h3 class="font-bold text-white truncate group-hover:text-primary-400 transition-colors">Discrete
                        Mathematics II</h3>
                    <p class="text-xs text-slate-400 mb-2">Dr. Emily Noether</p>
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] bg-white/5 px-2 py-0.5 rounded text-slate-300">15 Topics</span>
                    </div>
                </div>
                <div class="flex items-center justify-center text-slate-600 group-hover:text-white transition-colors">
                    <span class="material-symbols-rounded">chevron_right</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 w-full z-30 bottom-nav">
        <div class="max-w-md mx-auto h-20 flex justify-between items-center px-6">
            <button class="flex flex-col items-center gap-1 text-primary-400">
                <span class="material-symbols-rounded text-2xl filled">auto_stories</span>
                <span class="text-[10px] font-medium">Courses</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
                <span class="material-symbols-rounded text-2xl">chat_bubble</span>
                <span class="text-[10px] font-medium">AI Chat</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
                <span class="material-symbols-rounded text-2xl">task</span>
                <span class="text-[10px] font-medium">Tasks</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
                <span class="material-symbols-rounded text-2xl">person</span>
                <span class="text-[10px] font-medium">Profile</span>
            </button>
        </div>
    </div>

</body>

</html>
