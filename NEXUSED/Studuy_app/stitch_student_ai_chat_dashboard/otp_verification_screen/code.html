<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP Verification</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb', // Main Brand Color
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                            950: '#172554',
                        },
                        dark: {
                            bg: '#0f1117',
                            card: '#181b25',
                            border: '#2a2f3e'
                        }
                    },
                    animation: {
                        'bounce-slight': 'bounceSlight 2s infinite',
                        'ping-slow': 'pingSlow 3s cubic-bezier(0, 0, 0.2, 1) infinite',
                    },
                    keyframes: {
                        bounceSlight: {
                            '0%, 100%': { transform: 'translateY(-5%)' },
                            '50%': { transform: 'translateY(0)' },
                        },
                        pingSlow: {
                            '75%, 100%': { transform: 'scale(2)', opacity: '0' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f1117;
            color: white;
            /* Fallback for Tailwind */
            overflow-x: hidden;
        }

        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 85% 15%, rgba(37, 99, 235, 0.1), transparent 30%),
                radial-gradient(circle at 15% 85%, rgba(96, 165, 250, 0.05), transparent 30%);
        }

        .glass-card {
            background: rgba(24, 27, 37, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .otp-input:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="text-white antialiased flex flex-col items-center justify-center min-h-screen p-4">

    <div class="bg-mesh"></div>

    <div class="glass-card w-full max-w-[420px] rounded-3xl p-8 relative overflow-hidden flex flex-col items-center">

        <!-- Back Button -->
        <div class="absolute top-6 left-6 cursor-pointer text-slate-400 hover:text-white transition-colors"
            onclick="history.back()">
            <span class="material-symbols-rounded text-2xl">arrow_back_ios_new</span>
        </div>

        <!-- Animated Icon -->
        <div class="relative size-24 mb-6 flex items-center justify-center">
            <div class="absolute inset-0 bg-primary-500/20 rounded-full animate-ping-slow"></div>
            <div
                class="relative size-20 bg-gradient-to-br from-primary-600 to-primary-800 rounded-full flex items-center justify-center shadow-lg shadow-primary-500/30 animate-bounce-slight z-10">
                <span class="material-symbols-rounded text-4xl text-white">shield_lock</span>
            </div>
            <!-- Status Badge -->
            <div class="absolute -right-2 top-0 bg-green-500 rounded-full p-1.5 border-4 border-dark-card z-20">
                <span class="material-symbols-rounded text-[14px] font-bold text-white leading-none">check</span>
            </div>
        </div>

        <!-- Text -->
        <h2 class="text-2xl font-bold text-center mb-2">Verify it's you</h2>
        <p class="text-slate-400 text-center text-sm mb-8 px-4 leading-relaxed">
            We've sent a 6-digit code to <br>
            <span class="text-white font-medium">alex.study@email.com</span>
        </p>

        <!-- OTP Inputs -->
        <div class="flex gap-2 sm:gap-3 mb-8 w-full justify-center">
            <input
                class="otp-input w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:bg-white/10 transition-all"
                maxlength="1" type="number" placeholder="•" autofocus
                oninput="if(this.value.length > 1) this.value = this.value.slice(0, 1); if(this.value.length === 1) this.nextElementSibling?.focus()">
            <input
                class="otp-input w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:bg-white/10 transition-all"
                maxlength="1" type="number" placeholder="•"
                oninput="if(this.value.length > 1) this.value = this.value.slice(0, 1); if(this.value.length === 1) this.nextElementSibling?.focus(); if(this.value.length === 0) this.previousElementSibling?.focus()">
            <input
                class="otp-input w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:bg-white/10 transition-all"
                maxlength="1" type="number" placeholder="•"
                oninput="if(this.value.length > 1) this.value = this.value.slice(0, 1); if(this.value.length === 1) this.nextElementSibling?.focus(); if(this.value.length === 0) this.previousElementSibling?.focus()">
            <input
                class="otp-input w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:bg-white/10 transition-all"
                maxlength="1" type="number" placeholder="•"
                oninput="if(this.value.length > 1) this.value = this.value.slice(0, 1); if(this.value.length === 1) this.nextElementSibling?.focus(); if(this.value.length === 0) this.previousElementSibling?.focus()">
        </div>

        <!-- Timer -->
        <div class="flex flex-col items-center gap-2 mb-8">
            <p class="text-sm text-slate-500">Didn't receive code?</p>
            <div class="flex items-center gap-2">
                <span class="text-sm text-slate-400">Resend in</span>
                <span class="text-sm font-semibold text-primary-400 tabular-nums">00:45</span>
            </div>
            <button class="hidden text-sm font-semibold text-white hover:text-primary-400 transition-colors">Resend
                Code</button>
        </div>

        <!-- Verify Button -->
        <button
            class="w-full bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-bold py-4 rounded-xl shadow-[0_10px_40px_-10px_rgba(37,99,235,0.5)] transition-all transform active:scale-[0.98] flex items-center justify-center gap-2 group">
            Verify & Proceed
            <span class="material-symbols-rounded group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </button>

    </div>

</body>

</html>
