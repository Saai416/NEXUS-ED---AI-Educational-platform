<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduStudy AI - Login & Sign Up</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb', // Main Brand Color
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                            950: '#172554',
                        },
                        dark: {
                            bg: '#0f1117',
                            card: '#181b25',
                            border: '#2a2f3e'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.6s ease-out forwards',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f1117;
            color: white;
            /* Fallback for Tailwind */
            overflow-x: hidden;
        }

        /* Dynamic Background Mesh */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(37, 99, 235, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(147, 197, 253, 0.1), transparent 25%);
        }

        /* Glassmorphism Utilities */
        .glass-card {
            background: rgba(24, 27, 37, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Toggle Logic */
        #signup-form {
            display: none;
        }

        #teacher-code-field {
            display: none;
        }

        #tab-signup:checked~.form-container #signup-form {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        #tab-signup:checked~.form-container #login-form {
            display: none;
        }

        #tab-login:checked~.form-container #login-form {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        #teacher-toggle:checked~#teacher-code-field {
            display: block;
            animation: slideUp 0.3s ease;
        }

        /* Tab Slider Animation */
        .tab-bg {
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        #tab-signup:checked~.controls .tab-bg {
            transform: translateX(100%);
        }

        #tab-signup:checked~.controls label[for="tab-signup"] {
            color: white;
        }

        #tab-signup:checked~.controls label[for="tab-login"] {
            color: #94a3b8;
        }
    </style>
</head>

<body class="text-white antialiased flex flex-col items-center justify-center min-h-screen p-4 sm:p-6">

    <!-- Ambient Background -->
    <div class="bg-mesh"></div>

    <!-- Main Card -->
    <div class="glass-card w-full max-w-[480px] rounded-3xl p-8 sm:p-10 relative overflow-hidden animate-slide-up">

        <!-- Decorative Glow -->
        <div
            class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-1 bg-gradient-to-r from-transparent via-primary-500 to-transparent opacity-70">
        </div>

        <!-- Header -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center size-14 rounded-2xl bg-primary-600/20 text-primary-400 mb-4 ring-1 ring-primary-500/30 shadow-[0_0_30px_-5px_rgba(37,99,235,0.4)]">
                <span class="material-symbols-rounded text-3xl">school</span>
            </div>
            <h1
                class="text-3xl font-bold tracking-tight mb-2 bg-gradient-to-br from-white to-gray-400 bg-clip-text text-transparent">
                Welcome Back</h1>
            <p class="text-slate-400 text-sm">Your intelligent study companion awaits.</p>
        </div>

        <!-- Controls (Tabs) -->
        <div class="relative flex bg-dark-bg/50 p-1.5 rounded-xl mb-8 border border-white/5 controls">
            <!-- Sliding Background -->
            <div
                class="tab-bg absolute top-1.5 left-1.5 w-[calc(50%-6px)] h-[calc(100%-12px)] bg-primary-600 rounded-lg shadow-lg z-0">
            </div>

            <input type="radio" name="auth-tab" id="tab-login" class="hidden" checked>
            <input type="radio" name="auth-tab" id="tab-signup" class="hidden">

            <label for="tab-login"
                class="relative z-10 flex-1 text-center py-2.5 text-sm font-medium cursor-pointer transition-colors duration-300 text-white">
                Log In
            </label>
            <label for="tab-signup"
                class="relative z-10 flex-1 text-center py-2.5 text-sm font-medium cursor-pointer transition-colors duration-300 text-slate-400 hover:text-white">
                Sign Up
            </label>
        </div>

        <!-- Forms Container -->
        <div class="form-container">

            <!-- Login Form -->
            <div id="login-form" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 ml-1 uppercase tracking-wider">Email</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-rounded absolute left-4 top-3.5 text-slate-500 group-focus-within:text-primary-400 transition-colors">mail</span>
                        <input type="email" placeholder="student@university.edu"
                            class="glass-input w-full rounded-xl py-3.5 pl-12 pr-4 text-sm placeholder:text-slate-600 focus:ring-0">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between items-center ml-1">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
                        <a href="#"
                            class="text-xs text-primary-400 hover:text-primary-300 transition-colors">Forgot?</a>
                    </div>
                    <div class="relative group">
                        <span
                            class="material-symbols-rounded absolute left-4 top-3.5 text-slate-500 group-focus-within:text-primary-400 transition-colors">lock</span>
                        <input type="password" placeholder="••••••••"
                            class="glass-input w-full rounded-xl py-3.5 pl-12 pr-12 text-sm placeholder:text-slate-600 focus:ring-0">
                        <button class="absolute right-4 top-3.5 text-slate-500 hover:text-slate-300 transition-colors">
                            <span class="material-symbols-rounded text-lg">visibility_off</span>
                        </button>
                    </div>
                </div>

                <button
                    class="w-full bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-semibold py-4 rounded-xl shadow-[0_10px_40px_-10px_rgba(37,99,235,0.5)] transition-all transform active:scale-[0.98] mt-2">
                    Sign In
                </button>
            </div>

            <!-- Sign Up Form -->
            <div id="signup-form" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 ml-1 uppercase tracking-wider">Full Name</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-rounded absolute left-4 top-3.5 text-slate-500 group-focus-within:text-primary-400 transition-colors">person</span>
                        <input type="text" placeholder="Alex Chen"
                            class="glass-input w-full rounded-xl py-3.5 pl-12 pr-4 text-sm placeholder:text-slate-600 focus:ring-0">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 ml-1 uppercase tracking-wider">Email</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-rounded absolute left-4 top-3.5 text-slate-500 group-focus-within:text-primary-400 transition-colors">mail</span>
                        <input type="email" placeholder="student@university.edu"
                            class="glass-input w-full rounded-xl py-3.5 pl-12 pr-4 text-sm placeholder:text-slate-600 focus:ring-0">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 ml-1 uppercase tracking-wider">Password</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-rounded absolute left-4 top-3.5 text-slate-500 group-focus-within:text-primary-400 transition-colors">lock</span>
                        <input type="password" placeholder="Create a strong password"
                            class="glass-input w-full rounded-xl py-3.5 pl-12 pr-12 text-sm placeholder:text-slate-600 focus:ring-0">
                    </div>
                </div>

                <!-- Teacher Toggle -->
                <div class="flex items-center gap-3 p-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition-colors cursor-pointer"
                    onclick="document.getElementById('teacher-toggle').click()">
                    <div class="relative flex items-center">
                        <input type="checkbox" id="teacher-toggle" class="peer sr-only">
                        <div class="w-10 h-6 bg-slate-700 rounded-full peer-checked:bg-primary-600 transition-colors">
                        </div>
                        <div
                            class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-all peer-checked:translate-x-4">
                        </div>
                    </div>
                    <span class="text-sm font-medium text-slate-200">I am a Teacher</span>
                </div>

                <!-- Conditional Code -->
                <div id="teacher-code-field" class="space-y-1.5 pt-1">
                    <label class="text-xs font-semibold text-primary-400 ml-1 uppercase tracking-wider">Faculty
                        Code</label>
                    <div class="relative group">
                        <span class="material-symbols-rounded absolute left-4 top-3.5 text-primary-400">vpn_key</span>
                        <input type="text" placeholder="Enter provided code"
                            class="glass-input w-full rounded-xl py-3.5 pl-12 pr-4 text-sm border-primary-500/50 bg-primary-500/10 placeholder:text-primary-300 text-primary-100 focus:ring-0">
                    </div>
                </div>

                <button
                    class="w-full bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-semibold py-4 rounded-xl shadow-[0_10px_40px_-20px_rgba(37,99,235,0.6)] transition-all transform active:scale-[0.98] mt-2">
                    Create Account
                </button>
            </div>

        </div>

        <!-- Social Divider -->
        <div class="relative flex py-8 items-center">
            <div class="flex-grow border-t border-slate-700"></div>
            <span class="flex-shrink mx-4 text-xs text-slate-500 uppercase tracking-widest">Or continue with</span>
            <div class="flex-grow border-t border-slate-700"></div>
        </div>

        <!-- Social Buttons -->
        <div class="grid grid-cols-2 gap-4">
            <button
                class="flex items-center justify-center gap-2.5 h-12 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all group">
                <img src="https://lh3.googleusercontent.com/COxitq8kLLEpImp0ChKKqPRCMjD215_yNZlu26kTBtqF47JujX8Zv0ItrMC1tIgZkVM"
                    alt="Google" class="w-5 h-5 opacity-80 group-hover:opacity-100 transition-opacity">
                <span class="text-sm font-medium text-slate-300 group-hover:text-white">Google</span>
            </button>
            <button
                class="flex items-center justify-center gap-2.5 h-12 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all group">
                <span class="material-symbols-rounded text-xl text-slate-300 group-hover:text-white">laptop_mac</span>
                <span class="text-sm font-medium text-slate-300 group-hover:text-white">Apple</span>
            </button>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-slate-500 mt-8 leading-relaxed">
            By continuing, you agree to our
            <a href="#" class="text-slate-400 hover:text-primary-400 transition-colors">Terms</a> &
            <a href="#" class="text-slate-400 hover:text-primary-400 transition-colors">Privacy Policy</a>
        </p>

    </div>
</body>

</html>
