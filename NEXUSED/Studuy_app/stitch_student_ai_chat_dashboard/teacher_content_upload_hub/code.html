<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Upload Hub</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        },
                        dark: {
                            bg: '#0f1117',
                            card: '#181b25',
                            border: '#2a2f3e'
                        }
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        pulseGlow: {
                            '0%, 100%': { opacity: '1', boxShadow: '0 0 0px rgba(37, 99, 235, 0)' },
                            '50%': { opacity: '0.8', boxShadow: '0 0 20px rgba(37, 99, 235, 0.3)' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f1117;
            color: white;
            /* Fallback for Tailwind */
            overflow-x: hidden;
        }

        .glass-card {
            background: #181b25;
            border: 1px solid #2a2f3e;
        }

        .upload-zone {
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .upload-zone:hover,
        .upload-zone.active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        /* Custom Radio Buttons */
        input[type="radio"]:checked+div {
            background: rgba(37, 99, 235, 0.1);
            border-color: #3b82f6;
            color: white;
        }
    </style>
</head>

<body class="text-white antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-20 bg-[#0f1117]/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-xl mx-auto px-5 py-4 flex items-center justify-between">
            <button onclick="history.back()"
                class="size-10 rounded-xl hover:bg-white/5 flex items-center justify-center transition-colors text-slate-400 hover:text-white">
                <span class="material-symbols-rounded">arrow_back_ios_new</span>
            </button>
            <h1 class="font-bold text-lg">Upload Content</h1>
            <div class="size-10"></div> <!-- Spacer -->
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-xl mx-auto px-5 py-8 w-full space-y-8 flex-1">

        <!-- Intro -->
        <div>
            <h2 class="text-2xl font-bold bg-gradient-to-br from-white to-slate-400 bg-clip-text text-transparent">New
                Study Material</h2>
            <p class="text-slate-400 text-sm mt-1">Upload content to generate AI study guides and quizzes.</p>
        </div>

        <!-- Form -->
        <div class="space-y-6">

            <!-- Context Name -->
            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Content Title</label>
                <input type="text" id="content-title" placeholder="e.g., Intro to Biology - Week 1"
                    class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-4 text-white placeholder:text-slate-600 focus:ring-0 focus:border-primary-500/50 transition-all">
            </div>

            <!-- Source Type -->
            <div class="grid grid-cols-3 gap-3">
                <label class="cursor-pointer">
                    <input type="radio" name="source" value="manual" class="hidden" checked
                        onchange="toggleSource('manual')">
                    <div
                        class="source-card border border-white/10 rounded-xl p-4 flex flex-col items-center gap-2 transition-all hover:bg-white/5 text-slate-400">
                        <span class="material-symbols-rounded text-2xl">edit_note</span>
                        <span class="text-sm font-medium">Text</span>
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="source" value="url" class="hidden" onchange="toggleSource('url')">
                    <div
                        class="source-card border border-white/10 rounded-xl p-4 flex flex-col items-center gap-2 transition-all hover:bg-white/5 text-slate-400">
                        <span class="material-symbols-rounded text-2xl">link</span>
                        <span class="text-sm font-medium">Web Link</span>
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="source" value="file" class="hidden" onchange="toggleSource('file')">
                    <div
                        class="source-card border border-white/10 rounded-xl p-4 flex flex-col items-center gap-2 transition-all hover:bg-white/5 text-slate-400">
                        <span class="material-symbols-rounded text-2xl">upload_file</span>
                        <span class="text-sm font-medium">PDF / DOCX / File</span>
                    </div>
            </div>
            </label>
        </div>

        <!-- Input Areas -->
        <div id="input-container" class="relative">

            <!-- Text Input -->
            <div id="input-manual" class="input-section">
                <div class="upload-zone rounded-2xl p-6 flex flex-col items-center justify-center text-center min-h-[200px] relative group cursor-text"
                    onclick="document.getElementById('text-content').focus()">
                    <textarea id="text-content"
                        class="absolute inset-0 w-full h-full bg-transparent border-none focus:ring-0 p-6 text-sm text-white resize-none z-10 placeholder:text-slate-600"
                        placeholder="Paste your lecture notes, syllabus, or raw text here..."></textarea>
                    <div
                        class="absolute bottom-4 right-4 text-[10px] text-slate-600 font-mono bg-black/20 px-2 py-1 rounded">
                        0 / 10,000
                    </div>
                </div>
            </div>

            <!-- URL Input -->
            <div id="input-url" class="input-section hidden">
                <div class="bg-white/5 border border-white/10 rounded-xl p-6 flex flex-col gap-2">
                    <label class="text-xs text-slate-400 uppercase font-semibold">Content URL</label>
                    <input type="url" id="url-content" placeholder="https://..."
                        class="w-full bg-black/20 border border-white/10 rounded-lg p-3 text-white focus:ring-1 focus:ring-primary-500 outline-none">
                </div>
            </div>

            <!-- File Input -->
            <div id="input-file" class="input-section hidden">
                <input type="file" id="file-upload" class="hidden" accept=".pdf,.txt,.md,.docx,.doc"
                    onchange="handleFileSelect(this)">
                <div class="upload-zone rounded-2xl p-8 flex flex-col items-center justify-center text-center min-h-[200px] border-2 border-dashed border-white/10 hover:border-primary-500/50 hover:bg-primary-500/50 transition-all cursor-pointer"
                    onclick="document.getElementById('file-upload').click()">
                    <div class="bg-white/5 rounded-full p-4 mb-4">
                        <span class="material-symbols-rounded text-3xl text-slate-400">cloud_upload</span>
                    </div>
                    <p class="text-slate-300 font-medium mb-1" id="file-label">Click to upload or drag and drop</p>
                    <p class="text-slate-500 text-xs">PDF, DOCX, TXT, or MD (Max 10MB)</p>
                </div>
            </div>
        </div>

        <button onclick="uploadContent()" id="upload-btn"
            class="w-full bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-bold py-4 rounded-xl shadow-[0_10px_40px_-10px_rgba(37,99,235,0.5)] transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
            <span class="material-symbols-rounded">cloud_upload</span>
            <span id="btn-text">Upload & Process</span>
        </button>

        </div>

        <!-- Processing State (Mock) -->
        <div class="glass-card rounded-2xl p-5 border border-white/5">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-sm font-bold text-white">System Status</h3>
                <span
                    class="text-[10px] font-bold text-green-400 bg-green-900/20 px-2 py-0.5 rounded border border-green-500/20 uppercase tracking-widest">Online</span>
            </div>

            <div class="space-y-6 relative">
                <!-- Vertical Line -->
                <div class="absolute left-[15px] top-2 bottom-4 w-[2px] bg-white/5 z-0"></div>

                <!-- Step 1 (Done) -->
                <div class="flex gap-4 relative z-10">
                    <div
                        class="size-8 rounded-full bg-green-500/20 border border-green-500 text-green-500 flex items-center justify-center shrink-0">
                        <span class="material-symbols-rounded text-sm font-bold">check</span>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-white">Content Acquisition</p>
                        <p class="text-xs text-slate-500">Ready for input</p>
                    </div>
                </div>

                <!-- Step 2 (Pending/Active) -->
                <div class="flex gap-4 relative z-10 opacity-50">
                    <div
                        class="size-8 rounded-full bg-white/5 border border-white/10 text-slate-500 flex items-center justify-center shrink-0">
                        <span class="material-symbols-rounded text-sm animate-spin-slow">sync</span>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-white">Vector Indexing</p>
                        <p class="text-xs text-slate-500">Waiting for data...</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

</body>

</html>
<script>
    function toggleSource(mode) {
        // Update Radio UI
        document.querySelectorAll('input[name="source"]').forEach(r => {
            const card = r.nextElementSibling;
            if (r.checked) {
                card.classList.add('border-primary-500', 'bg-primary-500/10', 'text-white');
                card.classList.remove('border-white/10', 'text-slate-400');
            } else {
                card.classList.remove('border-primary-500', 'bg-primary-500/10', 'text-white');
                card.classList.add('border-white/10', 'text-slate-400');
            }
        });

        // Show/Hide Inputs
        document.querySelectorAll('.input-section').forEach(el => el.classList.add('hidden'));
        document.getElementById(`input-${mode}`).classList.remove('hidden');
    }

    function handleFileSelect(input) {
        if (input.files && input.files[0]) {
            document.getElementById('file-label').textContent = input.files[0].name;
        }
    }

    async function uploadContent() {
        const btn = document.getElementById('upload-btn');
        const btnText = document.getElementById('btn-text');
        const title = document.getElementById('content-title').value;
        const mode = document.querySelector('input[name="source"]:checked').value;

        if (!title) {
            alert("Please enter a content title");
            return;
        }

        const formData = new FormData();
        formData.append('content_name', title);

        if (mode === 'manual') {
            const text = document.getElementById('text-content').value;
            if (!text) return alert("Please enter some text");
            formData.append('text', text);
        } else if (mode === 'url') {
            const url = document.getElementById('url-content').value;
            if (!url) return alert("Please enter a URL");
            formData.append('url', url);
        } else if (mode === 'file') {
            const fileInput = document.getElementById('file-upload');
            if (!fileInput.files[0]) return alert("Please select a file");
            formData.append('file', fileInput.files[0]);
        }

        // UI Loading State
        btn.disabled = true;
        btnText.textContent = "Processing...";

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (response.ok) {
                // Show validation card updates or redirect
                alert("Upload Successful: " + result.message);
                // location.href = "/teacher"; // Redirect logic
            } else {
                alert("Error: " + result.error);
            }
        } catch (e) {
            alert("Upload failed: " + e.message);
        } finally {
            btn.disabled = false;
            btnText.textContent = "Upload & Process";
        }
    }

    // Init
    toggleSource('manual');
</script>
